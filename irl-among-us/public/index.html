<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #ff3b30; border: none; border-radius: 10px; color: white; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="lobbyScreen">
        <h1>Among Us IRL</h1>
        <input type="text" id="username" placeholder="Username">
        <button class="btn" onclick="createRoom()">Create Room</button>
        <input type="number" id="roomCode" placeholder="6-Digit Code">
        <button class="btn" onclick="joinRoom()">Join Room</button>
    </div>
    <div id="gameScreen" class="hidden">
        <h2 id="roleDisplay"></h2>
        <div id="actionPanel"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
