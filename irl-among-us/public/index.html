<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Space Party Game</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; margin: 20px; transition: border 0.2s ease; }
        .screen { display: none; }
        .active { display: block; }
        button { padding: 8px 14px; margin: 4px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        input, select { padding: 8px; margin: 4px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: white; }
        .player-item { padding: 10px; margin: 6px 0; background: #1e293b; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .player-item.dead { opacity: 0.5; text-decoration: line-through; }
        .btn-kill { background: #ef4444; color: white; }
        .btn-sheriff { background: #3b82f6; color: white; }
        .btn-jail { background: #64748b; color: white; }
        .btn-execute { background: #dc2626; color: white; animation: pulse 1.5s infinite; }
        .btn-vote { background: #10b981; color: white; }
        #gameLog { background: #020617; padding: 10px; border-radius: 6px; height: 150px; overflow-y: auto; border: 1px solid #334155; margin-top: 20px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="authScreen" class="screen active">
        <h2>Enter Galactic Arena</h2>
        <input type="text" id="usernameInput" placeholder="Enter Username..."><br>
        <button onclick="createRoom()" style="background: #3b82f6; color: white;">Create Game Lobby</button>
        <hr style="border-color: #334155;">
        <input type="text" id="roomCodeInput" placeholder="Enter 6-Digit Room Code..."><br>
        <button onclick="joinRoom()" style="background: #10b981; color: white;">Join Existing Game</button>
    </div>

    <div id="lobbyScreen" class="screen">
        <h2 id="roomDisplay">Room: ------</h2>
        <h3>Players Logged In:</h3>
        <ul id="playerList"></ul>

        <div id="hostControls" style="display: none;">
            <h3>Role Options Assignment:</h3>
            <label>Imposters: </label>
            <select id="imposterSelect" onchange="sendConfigUpdate()">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
            </select><br>
            <label>Doctors: </label>
            <select id="doctorSelect" onchange="sendConfigUpdate()">
                <option value="0">0</option><option value="1">1</option><option value="2">2</option>
            </select><br>
            <label>Sheriffs: </label>
            <select id="sheriffSelect" onchange="sendConfigUpdate()">
                <option value="0">0</option><option value="1">1</option><option value="2">2</option>
            </select><br>
            <label>Jailors: </label>
            <select id="jailorSelect" onchange="sendConfigUpdate()">
                <option value="0">0</option><option value="1">1</option><option value="2">2</option>
            </select><br><br>
            <button onclick="startGame()" style="background: #10b981; color: white; width: 100%;">Launch Simulation</button>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <h2 id="roleDisplay">Your Role: Unknown</h2>
        <h3 id="taskProgress">Tasks completed: 0 / 0</h3>
        
        <button onclick="logTask()" style="background: #f59e0b; color: black;">Complete Assigned Task</button>
        <button onclick="callMeeting()" style="background: #3b82f6; color: white;">Emergency Assembly</button>
        <button onclick="reportBody()" style="background: #ef4444; color: white;">Report Fallen Comrade</button>

        <div id="meetingControls" style="display: none; background: #1e293b; padding: 10px; margin: 15px 0; border-radius: 6px; border: 1px dashed #ef4444;">
            <h4 style="margin: 5px 0; color: #ef4444;">Assembly Council Active</h4>
            <button onclick="hostStartMeeting()" style="background: #8b5cf6; color: white;">Host: Begin Deliberation Phase</button>
            <button onclick="castVote('skip')" style="background: #64748b; color: white;">Skip Collective Voting</button>
        </div>

        <h3>Active Roster Area:</h3>
        <div id="gamePlayers"></div>

        <h3>Sim Log Terminal:</h3>
        <div id="gameLog"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
